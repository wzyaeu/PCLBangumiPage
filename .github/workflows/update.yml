name: 日常获取更新

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
    
      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install requests

      - name: Run main.py
        run: |
          python main.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to Github
        run: |
          git add .
          git diff --cached --quiet || git commit -m "自动更新"
          git push
      
      - name: Configure Git for Gitee
        run: |
          git remote add gitee https://gitee.com/wzyaeu/pcl-bangumi-page.git

          git config --global user.name "wzyaeu"
          
          git config --global user.email "your-email@example.com"

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |

          GITEE_REPO="https://${GITEE_TOKEN}@gitee.com/wzyaeu/pcl-bangumi-page.git"
          git remote remove gitee || true
          git remote add gitee "${GITEE_REPO}"
          git push gitee HEAD:main